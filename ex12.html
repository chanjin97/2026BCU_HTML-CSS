<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>입력양식 태그</title>
  </head>
  <body>
    <h1>가입 양식 태그</h1>
    <!-- 폼 태그 , 입력양식 태그 사용 시작 -->
    <form method="" action="" autocomplete="on">
      <!-- 폼 요소를 묶을 때 사용 -->
      <fieldset>
        <legend>개인 정보</legend>
        <label for="user_id">아이디</label>
        <input id="user_id" type="text" size="10" value="아이디 입력" />
        <br />

        <label for="user_pw">비밀번호</label>
        <input id="user_pw" type="password" />
        <br />

        <label for="addr">배송 주소</label>
        <input id="addr" type="text" />
        <br />

        <label for="email">이메일</label>
        <input id="email" type="email" />
        <br />

        <label for="phone">연락처</label>
        <input id="phone" type="tel" />
        <br />

        <label for="search">검색</label>
        <input id="search" type="search" />
      </fieldset>

      <fieldset>
        <legend>상품 선택</legend>
        <p><strong>주문할 상품을 선택해 주세요 </strong></p>
        <!-- 체크박스 삽입 -->
        <ul>
          <li>
            <label for="">
              <input type="checkbox" name="prod" value="s_3" />선물용 3kg
            </label>
            <input type="number" min="0" max="5" value="1" />개
          </li>
          <li>
            <label for="">
              <input type="checkbox" name="prod" value="s_5" />선물용 5kg
            </label>
            <input type="number" min="0" max="5" value="1" />개
          </li>
          <li>
            <label for="">
              <input type="checkbox" name="prod" value="f_3" />가정용 3kg
            </label>
            <input type="number" min="0" max="5" value="1" />개
          </li>
          <li>
            <label for="">
              <input type="checkbox" name="prod" value="f_5" />가정용 5kg
            </label>
            <input type="number" min="0" max="5" value="1" />개
          </li>
        </ul>

        <p><strong>포장 방법을 선택해 주세요</strong></p>
        <!-- 라디오 버튼 삽입 -->
        <ul>
          <li>
            <label for=""
              ><input type="radio" name="gift" value="yes" checked />선물
              포장</label
            >
          </li>
          <li>
            <label for=""
              ><input type="radio" name="gift" value="no" />선물 포장
              안함</label
            >
          </li>
        </ul>

        <label for="">만족도</label>
        <!-- 슬라이더 삽입, 최소값 0, 최대값 10, 간격은 2, 초기값은 6 -->
        <input type="range" min="0" max="10" step="2" value="6" />
      </fieldset>

      <fieldset>
        <legend>배송 날짜 지정</legend>
        <h2>날짜 지정</h2>

        <!-- 브라우저에 따라 출력 결과 다름, month, week : 파이어폭스에서는 일반 텍스트 필드로 출력, 크롬에서는 정확하게 출력 -->
        <input type="date" min="2026-01-01" max="2026-12-31" />
        <input type="month" />
        <input type="week" />
        <br />

        <h2>시간 지정</h2>
        <!-- 오전/오후, 시, 분 -->
        <input type="time" />

        <!-- 날짜와 시간 -->
        <input type="datetime-local" />
      </fieldset>

      <input type="image" src="./image/Night_Camp.jpg" alt="이미지 설명" />
      <br />
      <!-- 버튼삽입 -->
      <input type="submit" value="주문하기" />
      <input type="reset" value="취소하기" />
      <input
        type="button"
        value="반품하기"
        onclick="window.open('ex01.html')"
      />
      <br />

      <!-- 파일 첨부 -->
      <input type="file" />
      <input type="hidden" value="직접 로그인" name="url" />
    </form>
  </body>
</html>
