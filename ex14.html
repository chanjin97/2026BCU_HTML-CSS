<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 사용하기</title>
    <link rel="stylesheet" href="./css/ex14_style.css" />

    <style>
      /* 내부 스타일 시트 */
      /* CSS 스타일 작성 방법 (css주석) */
      p {
        /* 속성 : 값 ; */
        text-align: center;
        color: skyblue;
        /* color: rgb(29, 266, 88); */
      }
    </style>
  </head>
  <body>
    <h1>CSS 사용하기</h1>
    <!-- 인라인 스타일 적용 style="속성 : 값;" -->
    <p style="color: palevioletred">
      CSS는 웹 문서의 내용과 상관없이 디자인만 바꿀수 있다.
    </p>
    <p>다양한 기기에 맞게 탄력적으로 바뀌는 문서를 만들 수 있다.</p>
  </body>
</html>
