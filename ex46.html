<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ex46</title>
    <style>
      /* 속성 선택자 */
      input[type="text"] {
        background-color: skyblue;
      }

      input[type="password"] {
        background-color: pink;
      }
      /* 반응 선택자 */
      /* active : 마우스로 클릭했을때, */
      /* hover : 마우스 커서를 올렸을때 */
      h1:hover {
        color: blueviolet;
      }
      h1:active {
        color: palegreen;
      }
    </style>
  </head>
  <body>
    <form action="">
      <input type="text" />
      <input type="password" />
    </form>
    <h1>반응 선택자</h1>
  </body>
</html>
