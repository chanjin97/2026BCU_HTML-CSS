<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테이블 태그 연습</title>
  </head>
  <body>
    <!-- 테이블 연습 -->
    <table border="1">
      <!-- 첫 번째 행 -->
      <tr>
        <!-- 1행 1열 -->
        <td>이름</td>

        <!-- 1행 2열 -->
        <td>국어</td>

        <!-- 1행 3열 -->
        <td>영어</td>
      </tr>

      <!-- 두번째 행 -->
      <tr>
        <!-- 2행 1열 -->
        <td>홍길동</td>

        <!-- 2행 2열 -->
        <td>50</td>

        <!-- 2행 3열 -->
        <td>50</td>
      </tr>
      <tr>
        <td>김길동</td>
        <td>60</td>
        <td>70</td>
      </tr>
    </table>

    <table border="1">
      <!-- 표 위쪽에 제목 -->
      <caption>
        상품 구성
      </caption>

      <!-- 표의 제목 -->
      <thead>
        <!-- 1번째 행 -->
        <tr>
          <!-- 제목행을 글씨를 두껍게 표시, 표의 제목셀 생성 -->
          <th>용도</th>
          <th>중량</th>
          <th>개수</th>
          <th>가격</th>
        </tr>
      </thead>

      <!-- 2번째 행 -->
      <!-- 표의 본문 -->
      <tbody>
        <tr>
          <td>선물용</td>
          <td>3kg</td>
          <td>11~16과</td>
          <td>35,000원</td>
        </tr>

        <!-- 3번째 행 -->
        <tr>
          <td>선물용</td>
          <td>5kg</td>
          <td>18~20과</td>
          <td>50,000원</td>
        </tr>
      </tbody>

      <!-- 표의 요약 -->
      <tfoot>
        <tr>
          <td>요약</td>
          <td>8kg</td>
          <td>30과</td>
          <td>80,000원</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
