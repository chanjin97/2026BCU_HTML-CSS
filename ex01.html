<!-- ! 입력 후 tap키 -->

<!-- html5 버전으로 작성, 현재 문서가 html5언어로 작성한 웹문서 -->
<!doctype html>
<!-- html요소의 속성이 lang은 언어를 표시 -->
<html lang="ko">
  <!-- 웹 문서의 시작 -->

  <!-- 시작 head -->
  <head>
    <!-- 인코딩 명시 영어 -> 한글 -->
    <meta charset="UTF-8" />

    <!-- 모바일 기기에서 사용 -->
    <!-- meat태그를 사용하는 경우에는 웹 사이트의 키워드 , 간단한 설명 , 제작자의 정보등을 입력할때 사용 즉, 문서의 기본정보를 기록 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 작성자 정보 -->
    <meta name="chan jin bae" content="bscu" />

    <!-- 페이지 설명 -->
    <meta content="html의 기본 구조를 설명하는 페이지" />

    <!-- 문서의 제목 -->
    <title>html 문서 구조</title>
  </head>
  <!-- 종료 head / 이 안에는 웹문서를 해석하는데 필요한 기본 정보를 입력 -->

  <!-- 본문 내용 시작 -->
  <body>
    웹 브라우저에 내용을 표시하고 싶을때 body안에 내용을 입력한다
    <br />
    live server를 이용하면 페이지를 쉽게 실행할 수 있다.
    <p></p>
  </body>
  <!-- 본문 내용 종료 -->
</html>
<!-- 웹 문서의 종료 -->
<!-- html로 시작한 문서는 html이 종료태그를 입력하기 전까지 내용을 입력 -->
