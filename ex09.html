<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>멀티미디어</title>
  </head>
  <body>
    <h1>멀티미디어 태그 연습하기</h1>
    <h2>1. 이미지 삽입하기</h2>

    <!-- 이미지 삽임 -->
    <img src="image/img1.jpg" alt="벚꽃 길" width="50%" />
    <!-- 크기 단위를 % : 웹브라우저 창의 너비와 높이를 기준으로 크기 결정 ,
    크기 단위를px : 이미지의 너비와 높이를 해당 픽셀만큼 크기 조절 , 웹 브라우저 크기에 영향 없음 -->
    <br />
    <br />

    <img src="image/img2.jpg" width="150" />

    <img src="image/img2.jpg" width="300" height="500" />
    <br />
    <br />

    <h2>2. 오디오 삽입하기</h2>
    <!-- 오디오 삽입 -->
    <audio src="audio/evocation.mp3" controls autoplay loop></audio>

    <!-- autoplay : 자동재생(추천 안함) , loop : 반복 실행 , muted : 소리 제거 -->
    <h2>3. 비디오 삽입하기</h2>
    <!-- 비디오 삽입 -->
    <video
      src="video/movie.mp4"
      controls
      width="300"
      height="300"
      poster="image/img1.jpg"
    ></video>
    <!-- poster : 썸네일 -->

    <!-- 90페이지 -->
