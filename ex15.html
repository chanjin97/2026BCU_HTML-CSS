<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* 전체 선택자 */
      * {
        margin: 0;
      }
      /* 태그 선택자 */
      p {
        font-style: italic;
      }
      /* 클래스 선택자 : 특정 부분에 스타일을 적용 */
      .bgc_skyblue {
        background-color: skyblue;
      }
      /* 아이디 선택자 : 특정 부분에 딱 한번 스타일을 적용 */
      #container {
        width: 500px;
        margin: 10px auto;
        padding: 10px;
        border: 1px solid #000;
      }
      h1,
      p {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <!-- 이미지 삽입 -->
      <img src="./image/sky.jpg" width="200" />
      <h1 class="bgc_skyblue">css의 선택자</h1>
      <p>
        선택자에는 전체선택자, 태그선택자, 아이디 선택자, 클래스 선택자가 있다.
      </p>
      <p>전체 선택자는 전체 요소에 스타일을 적용할 때 사용한다</p>
      <p>태그 선택자는 특정 요소에 스타일을 적용할 때 사용한다.</p>
    </div>
  </body>
</html>
