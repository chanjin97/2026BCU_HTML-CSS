<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ex40</title>
    <style>
      /* 전체 선택자 */
      /* 초기화 */
      * {
        /* 마진을 0: 컨텐츠와 컨텐츠 사이의 여백 */
        margin: 0;
        /* 테두리와 글씨 사이의 여백 */
        padding: 0;
      }
      body {
        /* 본문의 너비 */
        width: 960px;
        /* 가운데 정렬 */
        margin: 0 auto;
      }
      div.item {
        border: 1px solid black;
        padding: 10px;
        margin: 0 3px;
        float: left;
      }
      div.clear {
        clear: both; /* float 해제 */
      }
    </style>
  </head>
  <body>
    <p>
      자손에는 float 속성을 지정하고, 부모의 overflow 속성에는 hidden 키워드를
      적용한다.
    </p>
    <div class="clear"></div>
    <div>
      <div class="item">메뉴 - 1</div>
      <div class="item">메뉴 - 2</div>
      <div class="item">메뉴 - 3</div>
      <div class="item">메뉴 - 4</div>
    </div>
    <div class="clear"></div>
    <p>
      자손에는 float 속성을 지정하고, 부모의 overflow 속성에는 hidden 키워드를
      적용한다.
    </p>
  </body>
</html>
