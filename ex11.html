<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>멀티미디어 태그 복습</title>
  </head>
  <body>
    <h1>멀티미디어 태그 복습</h1>
    <h2>이미지 삽임</h2>
    <!-- 너비 : 300 , 높이 : 200 -->
    <img src="image/img4.jpg" height="300" width="200" />

    <h2>오디오 파일 삽입</h2>
    <!-- 컨트롤 바 삽임 -->
    <audio src="audio/evocation.mp3" controls></audio>

    <h2>비디오 파일 삽입</h2>
    <!-- 너비:400, 높이 : 300, 컨트롤 바 삽입, 썸네일삽임 -->
    <video
      src="video/movie.mp4"
      height="400"
      width="300"
      controls
      poster="./image/Sea_Sky.jpg"
    ></video>

    <h2>하이퍼 링크 연결</h2>
    <a href="https://www.bscu.ac.kr" target="_blank">
      <img src="./image/img3.png" />
    </a>
  </body>
</html>
